# @package _global_

# Legacy multi-geometry EDM + CaloDiT training config translated to the current
# Hydra schema. Explicit values from the exported checkpoint config are kept,
# while missing modern fields are filled from the current EDM experiment template.

defaults:
  - /data: multi_geometry_legacy
  - /preprocessing@preprocessing: multi_geometry_legacy
  - /model@model.architecture: calodit_h384_l6_nh6_multigeo
  - /method: edm
  - /sampling: edm/heun_32_legacy
  - _self_

hydra:
  job:
    chdir: False
  run:
    dir: .
  output_subdir: null

experiment:
  project_name: calodit_edm
  run_name: edm_multi_resume
  output_dir: ${oc.env:RESULTS_DIR}/experiments
  seed: 42
  use_wandb: true

accelerator:
  cpu: false
  mixed_precision: "no"

model:
  model_path: null

data:
  train:
    need_geo_condn: true
    train_on: ["Par04", "SciPb", "ODD", "CLD"]
  valid:
    need_geo_condn: true
    train_on: ["Par04", "SciPb", "ODD", "CLD"]

train:
  learning_rate: 0.0005
  global_batch_size: 256
  num_workers: 0
  valid_num_workers: 0
  max_steps: 1000000
  gradient_accumulation_steps: 1
  max_grad_norm: 1.0
  optimizer_class: torch.optim.AdamW
  optimizer_args:
    betas: [0.9, 0.99]
    eps: 1.0e-08
    weight_decay: 0.0001
  lr_scheduler_class: src.lr_schedulers.get_lr_scheduler
  lr_scheduler_args:
    lr_scheduler_type: wsd
    num_warmup_steps: 10000
    num_stable_steps: 750000
    num_decay_steps: 240000
    decay_type: sqrt
  ema_scheduler_class: src.models.ema.InverseDecayEMA
  ema_scheduler_args:
    power: 0.75
    max_value: 0.9999
  sampling_args: ${sampling}
  valid_strategy: steps
  valid_steps: 1000
  logging_strategy: steps
  logging_steps: 100
  save_strategy: steps
  save_steps: 50000
  save_best_and_last_only: false
  load_best_model_at_end: false
  test_strategy: epoch
  test_steps: 10
  # These paths come from testing_dataset_all_detectors.zip after extraction under:
  # /aifs/user/data/huangzhengkun/datasets/hepdatasets/LEMURS/zenodo_17045562
  test_conditions:
    - ["Par04", 50, 0.0, 1.57, "/aifs/user/data/huangzhengkun/datasets/hepdatasets/LEMURS/zenodo_17045562/Par04SiW/testing/LEMURS_Par04SiW_gamma_1000events_50GeV_phi0.0_theta1.57.h5"]
    - ["Par04", 500, 0.0, 1.57, "/aifs/user/data/huangzhengkun/datasets/hepdatasets/LEMURS/zenodo_17045562/Par04SiW/testing/LEMURS_Par04SiW_gamma_1000events_500GeV_phi0.0_theta1.57.h5"]
    - ["SciPb", 50, 0.0, 1.57, "/aifs/user/data/huangzhengkun/datasets/hepdatasets/LEMURS/zenodo_17045562/Par04SciPb/testing/LEMURS_Par04SciPb_gamma_1000events_50GeV_phi0.0_theta1.57.h5"]
    - ["SciPb", 500, 0.0, 1.57, "/aifs/user/data/huangzhengkun/datasets/hepdatasets/LEMURS/zenodo_17045562/Par04SciPb/testing/LEMURS_Par04SciPb_gamma_1000events_500GeV_phi0.0_theta1.57.h5"]
    - ["ODD", 50, 0.0, 1.57, "/aifs/user/data/huangzhengkun/datasets/hepdatasets/LEMURS/zenodo_17045562/ODD/testing/LEMURS_ODD_gamma_1000events_50GeV_phi0.0_theta1.57.h5"]
    - ["ODD", 500, 0.0, 1.57, "/aifs/user/data/huangzhengkun/datasets/hepdatasets/LEMURS/zenodo_17045562/ODD/testing/LEMURS_ODD_gamma_1000events_500GeV_phi0.0_theta1.57.h5"]
    - ["CLD", 5, 0.0, 1.57, "/aifs/user/data/huangzhengkun/datasets/hepdatasets/LEMURS/zenodo_17045562/FCCeeCLD/testing/LEMURS_FCCeeCLD_gamma_1000events_5GeV_phi0.0_theta1.57.h5"]
    - ["CLD", 50, 0.0, 1.57, "/aifs/user/data/huangzhengkun/datasets/hepdatasets/LEMURS/zenodo_17045562/FCCeeCLD/testing/LEMURS_FCCeeCLD_gamma_1000events_50GeV_phi0.0_theta1.57.h5"]
  need_geo_condn: true
  train_on: ["Par04", "SciPb", "ODD", "CLD"]
