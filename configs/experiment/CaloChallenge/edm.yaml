# @package _global_

# CaloChallenge CCD2: EDM (Karras et al. 2022) Diffusion

defaults:
  - /data: ccd2
  - /preprocessing@preprocessing: ccd2
  - /model@model.architecture: calodit_3drope
  - /method: edm
  - /sampling: edm/heun_32
  - _self_

hydra:
  job:
    chdir: False
  run:
    dir: .
  output_subdir: null

experiment:
    project_name: caloflow_v1
    run_name: edm_ccd2
    output_dir: ./experiments
    seed: 42
    use_wandb: false

accelerator:
    cpu: false
    mixed_precision: "no"

model:
    model_path: null

train:
    learning_rate: 0.0005
    global_batch_size: 256
    num_workers: 0
    valid_num_workers: 0
    max_steps: 400000
    gradient_accumulation_steps: 1
    max_grad_norm: 1.0
    optimizer_class: torch.optim.AdamW
    optimizer_args:
        betas: [0.9, 0.95]
        eps: 1.0e-08
        weight_decay: 1.0e-05
    lr_scheduler_class: src.lr_schedulers.get_lr_scheduler
    lr_scheduler_args:
        lr_scheduler_type: wsd
        num_max_steps: 400000
        decay_type: sqrt
    ema_scheduler_class: src.models.ema.InverseDecayEMA
    ema_scheduler_args:
        power: 0.7
        max_value: 0.9999
    sampling_args: ${sampling}
    valid_strategy: steps
    valid_steps: 49999
    logging_strategy: steps
    logging_steps: 100
    save_strategy: steps
    save_steps: 49999
    save_best_and_last_only: true
    load_best_model_at_end: false
    test_strategy: no
    test_steps: 49999
    test_conditions:
        - ['CCD2', -1, 0.0, 1.57, '/aifs/user/home/huangzhengkun/datasets/hepdatasets/calochallenge_datasets/dataset_2_2.hdf5']
