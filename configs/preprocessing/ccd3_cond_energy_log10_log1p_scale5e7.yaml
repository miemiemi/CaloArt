# CCD3 preprocessing pipeline with log10 condition-energy encoding and a
# log1p(x / scale) value transform.
# Internal CCD CutNoise threshold in GeV after MeV->GeV conversion and the
# 0.033 sampling fraction. 5e-7 GeV corresponds to about 0.01515 MeV in the
# raw evaluator convention: 5e-7 * 1000 / 0.033.
# The log1p transition scale is matched to that same internal threshold.
steps:
  - class_name: src.data.preprocessing.CutNoise
    init_args:
      noise_level: 5.0e-07
      both_directions: true
  - class_name: src.data.preprocessing.Log1pTransform
    init_args:
      scale: 5.0e-07
  - class_name: src.data.preprocessing.Standarize
    init_args:
      mean: 0.6715544
      std: 2.0329632
condition_preprocessing:
  energy_encoding: log10
  energy_min: 1.0
  energy_max: 1000.0
