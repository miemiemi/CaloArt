# @package _global_

# CaloChallenge CCD2: Flow Matching with logit-normal time sampling and
# PixArt-style shared modulation on CaloLightningDiT.

defaults:
  - /data: ccd2
  - /preprocessing@preprocessing: ccd2
  - /model@model.architecture: calolightning_rope_sharemod_conv
  - /method: flow_matching/logit_normal
  - /sampling: flow/euler_50
  - _self_

hydra:
  job:
    chdir: False
  run:
    dir: .
  output_subdir: null

experiment:
  project_name: caloflow_v1
  run_name: flow_ccd2_pred_v_loss_v_logit_normal_calolightning_rope_sharemod_conv
  output_dir: ./experiments
  seed: 42
  use_wandb: true

accelerator:
  cpu: false
  mixed_precision: "no"

model:
  model_path: null

data:
  train:
    need_geo_condn: false
    train_on: null
  valid:
    need_geo_condn: false
    train_on: null

train:
  learning_rate: 0.0005
  global_batch_size: 256
  num_workers: 0
  valid_num_workers: 0
  max_steps: 400000
  gradient_accumulation_steps: 1
  max_grad_norm: 1.0
  optimizer_class: torch.optim.AdamW
  optimizer_args:
    betas: [0.9, 0.95]
    eps: 1.0e-08
    weight_decay: 1.0e-05
  lr_scheduler_class: src.lr_schedulers.get_lr_scheduler
  lr_scheduler_args:
    lr_scheduler_type: cosine
    num_training_steps: 400000
    num_warmup_steps: 10000
  ema_scheduler_class: src.models.ema.InverseDecayEMA
  ema_scheduler_args:
    power: 0.7
    max_value: 0.9999
  sampling_args: ${sampling}
  valid_strategy: steps
  valid_steps: 49999
  logging_strategy: steps
  logging_steps: 100
  save_strategy: steps
  save_steps: 49999
  save_best_and_last_only: true
  load_best_model_at_end: false
  test_strategy: steps
  test_steps: 49999
  test_conditions:
    - ['CCD2', -1, 0.0, 1.57, '/aifs/user/home/huangzhengkun/datasets/hepdatasets/calochallenge_datasets/dataset_2_2.hdf5']
  need_geo_condn: false
  train_on: null
