# CCD3 preprocessing pipeline with log10 condition-energy encoding.
# Internal CCD noise threshold in GeV after MeV->GeV conversion and the 0.033
# sampling fraction. 5e-7 GeV corresponds to about 0.01515 MeV in the raw
# evaluator convention: 5e-7 * 1000 / 0.033.
steps:
  - class_name: src.data.preprocessing.CutNoise
    init_args:
      noise_level: 5.0e-07
      both_directions: true
  - class_name: src.data.preprocessing.LogTransform
    init_args:
      eps: 1.0e-06
  - class_name: src.data.preprocessing.Standarize
    init_args:
      mean: -13.2129706
      std: 1.8322860
condition_preprocessing:
  energy_encoding: log10
  energy_min: 1.0
  energy_max: 1000.0
