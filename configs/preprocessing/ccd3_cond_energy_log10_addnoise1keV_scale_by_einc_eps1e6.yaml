# CCD3 preprocessing pipeline with log10 condition-energy encoding, a
# one-sided 1 keV AddNoise step, and shower normalization by incident energy
# before LogTransform.
# Internal CCD CutNoise threshold in GeV after MeV->GeV conversion and the
# 0.033 sampling fraction. 5e-7 GeV corresponds to about 0.01515 MeV in the
# raw evaluator convention: 5e-7 * 1000 / 0.033.
# AddNoise of 3.3e-8 GeV corresponds to about 1 keV in the raw evaluator
# convention: 3.3e-8 * 1000 / 0.033 = 0.001 MeV.
steps:
  - class_name: src.data.preprocessing.CutNoise
    init_args:
      noise_level: 5.0e-07
      both_directions: true
  - class_name: src.data.preprocessing.AddNoise
    init_args:
      noise_level: 3.3e-08
  - class_name: src.data.preprocessing.ScaleByIncidentEnergy
  - class_name: src.data.preprocessing.LogTransform
    init_args:
      eps: 1.0e-06
  - class_name: src.data.preprocessing.Standarize
    init_args:
      mean: -13.6893172
      std: 0.4906764
condition_preprocessing:
  energy_encoding: log10
  energy_min: 1.0
  energy_max: 1000.0
