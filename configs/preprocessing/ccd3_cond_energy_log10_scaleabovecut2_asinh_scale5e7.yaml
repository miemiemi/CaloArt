# CCD3 preprocessing pipeline with log10 condition-energy encoding, a
# reversible ScaleAboveCut x2 step, and an asinh(x / scale) value transform.
# Internal CCD CutNoise threshold in GeV after MeV->GeV conversion and the
# 0.033 sampling fraction. 5e-7 GeV corresponds to about 0.01515 MeV in the
# raw evaluator convention: 5e-7 * 1000 / 0.033.
# ScaleAboveCut amplifies voxels above the cut before the value transform and
# divides them back during inverse preprocessing.
steps:
  - class_name: src.data.preprocessing.CutNoise
    init_args:
      noise_level: 5.0e-07
      both_directions: true
  - class_name: src.data.preprocessing.ScaleAboveCut
    init_args:
      factor: 2.0
      threshold: 5.0e-07
  - class_name: src.data.preprocessing.AsinhTransform
    init_args:
      scale: 5.0e-07
  - class_name: src.data.preprocessing.Standarize
    init_args:
      mean: 0.8144645
      std: 2.4444059
condition_preprocessing:
  energy_encoding: log10
  energy_min: 1.0
  energy_max: 1000.0
