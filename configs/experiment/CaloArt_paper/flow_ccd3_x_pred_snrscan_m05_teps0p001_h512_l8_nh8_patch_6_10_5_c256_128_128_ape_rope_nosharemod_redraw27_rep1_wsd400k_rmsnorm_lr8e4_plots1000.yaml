# @package _global_

# Scale the patch_6_10_5 CCD3 snrscan-m05 recipe by increasing width and depth
# while keeping the training recipe fixed.

defaults:
  - /data: ccd3
  - /preprocessing@preprocessing: ccd3_energy_only
  - /model@model.architecture: calolightning_rope_sharemod_conv_ccd3_c256_128_128_nosharemod_h512_l8_nh8_patch_6_10_5_rmsnorm
  - /method: flow_matching/x_pred_mean0_teps0p001
  - /sampling: flow/heun_32
  - _self_

hydra:
  job:
    chdir: False
  run:
    dir: .
  output_subdir: null

experiment:
  project_name: CaloArt_paper
  run_name: flow_ccd3_x_pred_snrscan_m05_teps0p001_h512_l8_nh8_patch_6_10_5_c256_128_128_ape_rope_nosharemod_redraw27_rep1_wsd400k_rmsnorm_lr8e4_plots1000
  output_dir: ./experiments
  seed: 42
  use_wandb: true

accelerator:
  cpu: false
  mixed_precision: "no"

model:
  model_path: null

preprocessing:
  condition_preprocessing:
    energy_encoding: log10
    energy_min: 1.0
    energy_max: 1000.0

method:
  init_args:
    logit_normal_mean: -0.5
    logit_normal_std: 1.0

sampling:
  steps: 32
  solver: heun
  reject_redraw: true
  reject_redraw_max_ratio: 2.7
  reject_redraw_reject_nonfinite: true

train:
  learning_rate: 0.0008
  global_batch_size: 256
  num_workers: 0
  valid_num_workers: 0
  max_steps: 400000
  gradient_accumulation_steps: 1
  max_grad_norm: 1.0
  optimizer_class: torch.optim.AdamW
  optimizer_args:
    betas: [0.9, 0.95]
    eps: 1.0e-08
    weight_decay: 1.0e-05
  lr_scheduler_class: src.lr_schedulers.get_lr_scheduler
  lr_scheduler_args:
    lr_scheduler_type: wsd
    num_warmup_steps: 10000
    num_stable_steps: 180000
    num_decay_steps: 210000
    min_lr_ratio: 0.1
  ema_scheduler_class: src.models.ema.InverseDecayEMA
  ema_scheduler_args:
    power: 0.7
    max_value: 0.9999
  sampling_args: ${sampling}
  valid_strategy: steps
  valid_steps: 2500
  logging_strategy: steps
  logging_steps: 100
  save_strategy: steps
  save_steps: 25000
  save_best_and_last_only: true
  load_best_model_at_end: false
  test_strategy: steps
  test_steps: 25000
  test_num_showers: 1000
  test_conditions:
    - ['CCD3', -1, 0.0, 1.57, '/aifs/user/home/huangzhengkun/datasets/hepdatasets/calochallenge_datasets/dataset_3_3_4.hdf5']
  enable_plots: true
  enable_fpd: false
  save_test_model_artifact: true
  save_generated: false
  fpd_config:
    cut: 0.015151515151515152
    save_generated: false
    compute_kpd: false
  need_geo_condn: false
  train_on: null
